name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "项目1/**"
      - "静态平衡表/src/**"
      - ".github/workflows/build-macos.yml"

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 项目1/requirements-macos.txt

      - name: Install dependencies
        run: |
          brew install unixodbc
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r 项目1/requirements-macos.txt

      - name: Compile source
        run: |
          python -m py_compile \
            项目1/BOM查询工具.py \
            项目1/bom_legacy_tk.py \
            静态平衡表/src/mrp_balance_tool/pipeline.py \
            静态平衡表/src/mrp_balance_tool/gui.py

      - name: Verify bundled template
        run: test -s 项目1/assets/静态平衡表模板.xlsx

      - name: Build application
        working-directory: 项目1
        run: python -m PyInstaller --clean --noconfirm 供需协同工具V3.0_macOS.spec

      - name: Ad-hoc sign and verify
        working-directory: 项目1
        run: |
          codesign --force --deep --sign - dist/供需协同工具V3.0.app
          codesign --verify --deep --strict --verbose=2 dist/供需协同工具V3.0.app
          plutil -lint dist/供需协同工具V3.0.app/Contents/Info.plist
          test -x dist/供需协同工具V3.0.app/Contents/MacOS/供需协同工具V3.0

      - name: Create download zip
        working-directory: 项目1/dist
        run: ditto -c -k --sequesterRsrc --keepParent 供需协同工具V3.0.app 供需协同工具V3.0-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 供需协同工具V3.0-macOS
          path: 项目1/dist/供需协同工具V3.0-macOS.zip
          if-no-files-found: error
          retention-days: 14
