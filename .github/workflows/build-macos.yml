name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          brew install unixodbc

      - name: Build application
        run: python ci/build_macos.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supply-coordination-macos
          path: artifact/supply-coordination-macos.zip
          if-no-files-found: error
          retention-days: 14
