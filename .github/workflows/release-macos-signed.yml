name: Release signed macOS app

on:
  workflow_dispatch:

jobs:
  release-macos:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 项目1/requirements-macos.txt

      - name: Install dependencies
        run: |
          brew install unixodbc
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r 项目1/requirements-macos.txt

      - name: Compile and build
        run: |
          python -m py_compile \
            项目1/BOM查询工具.py \
            项目1/bom_legacy_tk.py \
            静态平衡表/src/mrp_balance_tool/pipeline.py \
            静态平衡表/src/mrp_balance_tool/gui.py
          test -s 项目1/assets/静态平衡表模板.xlsx
          cd 项目1
          python -m PyInstaller --clean --noconfirm 供需协同工具V3.0_macOS.spec

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Sign application
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          test -n "$APPLE_SIGNING_IDENTITY"
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            项目1/dist/供需协同工具V3.0.app
          codesign --verify --deep --strict --verbose=2 项目1/dist/供需协同工具V3.0.app

      - name: Notarize and staple
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          test -n "$APPLE_API_KEY_BASE64"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          NOTARY_ZIP="$RUNNER_TEMP/供需协同工具V3.0-notary.zip"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          ditto -c -k --sequesterRsrc --keepParent \
            项目1/dist/供需协同工具V3.0.app "$NOTARY_ZIP"
          xcrun notarytool submit "$NOTARY_ZIP" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple 项目1/dist/供需协同工具V3.0.app
          xcrun stapler validate 项目1/dist/供需协同工具V3.0.app

      - name: Final Gatekeeper verification
        run: |
          plutil -lint 项目1/dist/供需协同工具V3.0.app/Contents/Info.plist
          codesign --verify --deep --strict --verbose=2 项目1/dist/供需协同工具V3.0.app
          spctl --assess --type execute --verbose=4 项目1/dist/供需协同工具V3.0.app

      - name: Create signed download zip
        working-directory: 项目1/dist
        run: ditto -c -k --sequesterRsrc --keepParent 供需协同工具V3.0.app 供需协同工具V3.0-macOS-signed-notarized.zip

      - name: Upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: 供需协同工具V3.0-macOS-signed-notarized
          path: 项目1/dist/供需协同工具V3.0-macOS-signed-notarized.zip
          if-no-files-found: error
          retention-days: 30
